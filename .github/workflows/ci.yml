name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  policy-and-tests:
    name: Policy claim check and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          pip install pytest

      - name: Run policy claim check
        run: python tools/policy_claim_check.py

      - name: Run tests
        run: pytest -q
